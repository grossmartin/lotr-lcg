<style>
/* ------------------------------------------------------------------ *
 *  THEME TOKENS
 *  Palette: midnight ink, aged gold, parchment. Sphere colours per FFG.
 * ------------------------------------------------------------------ */
:root{
  --ink:#0c0e13;            /* deepest background */
  --ink-2:#141822;          /* panel */
  --ink-3:#1c2230;          /* raised panel */
  --line:#2c3342;           /* hairline */
  --gold:#c9a24a;           /* aged gold */
  --gold-bright:#e4c579;    /* highlight gold */
  --parch:#e9e1cf;          /* body text */
  --parch-dim:#a9a08c;      /* muted text */
  --ember:#c65a3a;          /* warning / danger accent */
  --ok:#5f9b6b;             /* buildable / success */

  --leadership:#8556c9;
  --tactics:#c0392b;
  --spirit:#3a76c4;
  --lore:#4a8f52;
  --neutral:#9aa0ab;
  --baggins:#d0a53a;
  --fellowship:#e6e6e6;

  --shadow:0 10px 30px rgba(0,0,0,.45);
  --radius:12px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 700px at 50% -220px, rgba(201,162,74,.10), transparent 60%),
    linear-gradient(180deg,#0a0c11,#0c0e13 40%,#0a0c11);
  color:var(--parch);
  font-family:"EB Garamond","Spectral",Georgia,serif;
  font-size:17px; line-height:1.55;
  min-height:100vh;
}
a{color:var(--gold-bright);text-decoration:none}
a:hover{text-decoration:underline}
img{display:block}

/* ---------- Masthead (the signature element) ---------- */
.mast{
  position:relative; text-align:center; cursor:pointer;
  padding:34px 20px 24px; border-bottom:1px solid var(--line);
  background:linear-gradient(180deg, rgba(201,162,74,.06), transparent);
}
.mast:hover h1{color:#f0d999}
.mast:focus-visible{outline:2px solid var(--gold);outline-offset:-4px}
.mast .ring{
  width:52px;height:52px;margin:0 auto 12px;border-radius:50%;
  border:2px solid var(--gold); position:relative;
  box-shadow:0 0 26px rgba(201,162,74,.35), inset 0 0 12px rgba(201,162,74,.25);
}
.mast .ring::after{content:"";position:absolute;inset:7px;border-radius:50%;border:1px solid rgba(201,162,74,.5)}
.mast h1{
  font-family:"Cinzel",serif; font-weight:600; letter-spacing:.14em;
  margin:0; font-size:clamp(20px,3.4vw,34px);
  color:var(--gold-bright); text-shadow:0 1px 0 #000, 0 0 22px rgba(201,162,74,.25);
}
.mast .sub{
  font-family:"Cinzel",serif; letter-spacing:.42em; text-transform:uppercase;
  font-size:11px; color:var(--parch-dim); margin-top:8px;
}
.mast .rule{width:min(560px,80%);height:1px;margin:16px auto 0;
  background:linear-gradient(90deg,transparent,var(--gold),transparent)}

/* ---------- Layout ---------- */
.wrap{max-width:1200px;margin:0 auto;padding:0 20px 80px}
.toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:center;margin:22px 0 6px}
.status{font-size:13px;color:var(--parch-dim);text-align:center;min-height:20px;margin-bottom:8px}
.status.err{color:var(--ember)}

.btn{
  font-family:"Cinzel",serif;font-size:12px;letter-spacing:.08em;
  background:var(--ink-3);color:var(--parch);border:1px solid var(--line);
  padding:9px 14px;border-radius:8px;cursor:pointer;transition:.15s}
.btn:hover{border-color:var(--gold);color:var(--gold-bright)}
.btn.gold{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#241a06;border-color:var(--gold);font-weight:700}
.btn.gold:hover{filter:brightness(1.08);color:#241a06}
.btn.big{font-size:14px;padding:13px 24px;letter-spacing:.12em;text-transform:uppercase;border-radius:10px;box-shadow:0 4px 16px rgba(201,162,74,.25)}
.btn.ghost{background:transparent;border-color:var(--gold);color:var(--gold-bright)}
.btn.ghost:hover{background:rgba(201,162,74,.10);color:var(--gold-bright)}

/* ---------- Round phases timeline ---------- */
.phases-intro{max-width:820px;margin:6px auto 18px;color:var(--parch-dim);font-size:15px;text-align:center}
.timeline{max-width:840px;margin:0 auto;position:relative}
.timeline::before{content:"";position:absolute;left:26px;top:10px;bottom:10px;width:2px;
  background:linear-gradient(180deg,transparent,var(--line),transparent)}
.phase{position:relative;margin:14px 0;padding-left:60px}
.phase .num{position:absolute;left:6px;top:2px;width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;z-index:2;
  font-family:"Cinzel",serif;font-weight:700;font-size:17px;color:#12151d;
  background:var(--pc,var(--gold));border:2px solid var(--ink);
  box-shadow:0 0 0 3px rgba(0,0,0,.35), 0 4px 10px rgba(0,0,0,.4)}
.phase .pcard{border:1px solid var(--line);border-left:4px solid var(--pc,var(--gold));
  border-radius:12px;background:linear-gradient(180deg,var(--ink-2),var(--ink));padding:12px 16px 14px}
.phase .ptitle{font-family:"Cinzel",serif;font-weight:700;font-size:18px;color:#f5f1e6;line-height:1.2}
.phase .pen{font-family:"Cinzel",serif;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--pc,var(--gold));margin-top:2px}
.phase ul{margin:10px 0 0;padding:0;list-style:none}
.phase li{position:relative;padding:4px 0 4px 18px;font-size:15.5px;line-height:1.5;color:var(--parch)}
.phase li::before{content:"›";position:absolute;left:0;color:var(--pc,var(--gold));font-weight:700}
.phase li.note{color:var(--parch-dim);font-style:italic;font-size:14px}
.phase li.note::before{content:"·"}
.subseq{margin-top:10px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.015)}
.subseq>summary{cursor:pointer;padding:9px 12px;font-family:"Cinzel",serif;font-size:13px;letter-spacing:.04em;color:var(--gold-bright);list-style:none}
.subseq>summary::-webkit-details-marker{display:none}
.subseq>summary::before{content:"▸ ";color:var(--gold)}
.subseq[open]>summary::before{content:"▾ "}
.subseq ol{margin:0;padding:4px 16px 12px 34px}
.subseq li{padding:3px 0;font-size:14.5px;color:var(--parch)}
.keywords{max-width:840px;margin:26px auto 0}
.keywords h3{font-family:"Cinzel",serif;color:var(--gold-bright);font-size:16px;letter-spacing:.06em;border-bottom:1px solid var(--line);padding-bottom:6px}
.kw{border:1px solid var(--line);border-radius:8px;padding:10px 14px;margin:8px 0;background:linear-gradient(180deg,var(--ink-2),var(--ink))}
.kw b{color:var(--gold-bright);font-family:"Cinzel",serif;font-size:14px}
.kw span{color:var(--parch);font-size:15px}

/* ---------- Deckbuilding guide ---------- */
.guide{max-width:860px;margin:0 auto}
.guide-intro{color:var(--parch-dim);font-size:15px;text-align:center;margin:4px auto 18px;max-width:760px}
.gsec{border:1px solid var(--line);border-radius:12px;margin:12px 0;overflow:hidden;
  background:linear-gradient(180deg,var(--ink-2),var(--ink))}
.gsec>summary{cursor:pointer;list-style:none;display:flex;align-items:center;gap:12px;
  padding:14px 16px;font-family:"Cinzel",serif;font-weight:700;font-size:17px;color:#f5f1e6}
.gsec>summary::-webkit-details-marker{display:none}
.gsec>summary .gnum{flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:var(--gold);
  color:#12151d;font-size:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.4)}
.gsec>summary::after{content:"▸";margin-left:auto;color:var(--gold);font-size:14px}
.gsec[open]>summary::after{content:"▾"}
.gsec[open]>summary{border-bottom:1px solid var(--line)}
.gbody{padding:12px 18px 18px}
.gbody h4{font-family:"Cinzel",serif;color:var(--gold-bright);font-size:14px;letter-spacing:.04em;margin:16px 0 6px}
.gbody h4:first-child{margin-top:2px}
.gbody p{font-size:15.5px;line-height:1.65;color:var(--parch);margin:0 0 10px}
.gbody ul{margin:0 0 10px;padding-left:20px}

/* ---------- Section headers ---------- */
.section{margin-top:40px}

.cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
.card{position:relative}
.card .imgwrap{position:relative;border-radius:9px;overflow:hidden;border:1px solid var(--line);background:var(--ink-3);aspect-ratio:.717}
.card .imgwrap img{width:100%;height:100%;object-fit:cover}
.card.notowned .imgwrap{outline:2px solid var(--ember);outline-offset:-2px}
.card .qty{                       /* sits OUTSIDE the rounded image so it's never clipped */
  position:absolute;top:-11px;left:-11px;z-index:4;

.card .cname .cn-qty{color:var(--gold-bright);font-family:"Cinzel",serif;font-weight:700}

  font-size:11px;text-align:center;padding:3px 4px;border-radius:5px}

.empty{border:1px dashed var(--line);border-radius:var(--radius);padding:30px;text-align:center;color:var(--parch-dim)}

const RDB = "https://ringsdb.com";
const SPHERE_COLORS = { leadership:"--leadership",tactics:"--tactics",spirit:"--spirit",
  lore:"--lore",neutral:"--neutral",baggins:"--baggins",fellowship:"--fellowship" };
const TYPE_ORDER = ["hero","ally","attachment","event","player-side-quest","treasure"];
const TYPE_LABEL = { hero:"Hrdinovia", ally:"Spojenci", attachment:"Prílohy",
  event:"Udalosti", "player-side-quest":"Vedľajšie úlohy", treasure:"Poklady", other:"Ostatné" };

const $ = s => document.querySelector(s);
const statusEl = $("#status");
function setStatus(msg,isErr){ statusEl.textContent = msg||""; statusEl.classList.toggle("err",!!isErr); }
function norm(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
  .replace(/[’'`]/g,"'").replace(/\s+/g," ").trim(); }

/* ---- localStorage helpers ---- */
function lsGet(k,def){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):def; }catch(e){ return def; } }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }

/* ---- network: fetch first, JSONP fallback (RingsDB supports ?jsonp=) ---- */
function jsonp(url,param){
  return new Promise((res,rej)=>{
    const cb="__rdb_"+Math.random().toString(36).slice(2);
    const s=document.createElement("script"); let done=false;
    window[cb]=d=>{done=true;res(d);clean();};
    function clean(){ try{delete window[cb];}catch(e){window[cb]=undefined;} s.remove(); }
    s.onerror=()=>{ if(!done){clean();rej(new Error("jsonp"));} };
    s.src=url+(url.includes("?")?"&":"?")+param+"="+cb;
    document.head.appendChild(s);
    setTimeout(()=>{ if(!done){clean();rej(new Error("timeout"));} },20000);
  });
}
async function getJSON(url){
  try{ const r=await fetch(url,{mode:"cors"}); if(r.ok) return await r.json(); }catch(e){}
  try{ return await jsonp(url,"jsonp"); }catch(e){}
  try{ return await jsonp(url,"callback"); }catch(e){}
  throw new Error("RingsDB nedostupné");
}

/* ---- card database ---- */
const CARDS = { byCode:{}, ownedTitles:new Set(), loaded:false };
const PLAYER_TYPES = new Set(["hero","ally","attachment","event","player-side-quest","treasure"]);
const OWNED_NORM = new Set(OWNED_PACKS.map(norm));

async function loadCards(force){
  const CACHE="lotr_cards_v2";
  if(!force){
    const c=lsGet(CACHE,null);
    if(c && c.t && (Date.now()-c.t < 1000*60*60*24*30) && Array.isArray(c.d)){ indexCards(c.d); return; }
  }
  setStatus("Načítavam databázu kariet z RingsDB…");
  const data = await getJSON(RDB+"/api/public/cards/");
  lsSet(CACHE,{t:Date.now(),d:data});
  indexCards(data);
}
function indexCards(list){
  CARDS.byCode={}; CARDS.ownedTitles=new Set();
  for(const c of list){
    CARDS.byCode[c.code]=c;
    if(OWNED_NORM.has(norm(c.pack_name))) CARDS.ownedTitles.add(norm(c.name));
  }
  CARDS.loaded=true;
}
function cardImg(c){
  const src = c && c.imagesrc ? c.imagesrc : null;
  if(src) return src.startsWith("http")?src:RDB+src;
  return RDB+"/bundles/cards/"+ (c?c.code:"") +".png";
}
function isOwnedCard(c){ return c && CARDS.ownedTitles.has(norm(c.name)); }

/* ---- deck cache + parse ---- */
const DECK_CACHE={};
async function loadDeck(id){
  if(DECK_CACHE[id]) return DECK_CACHE[id];
  const CK="lotr_deck_"+id;
  let raw=lsGet(CK,null);
  if(!raw){
    raw=await getJSON(RDB+"/api/public/decklist/"+id+".json");
    lsSet(CK,raw);
  }
  const parsed=parseDeck(raw); DECK_CACHE[id]=parsed; return parsed;
}
function parseDeck(raw){
  const slots=Object.assign({}, raw.slots||{});
  if(raw.heroes) for(const c in raw.heroes){ if(!(c in slots)) slots[c]=raw.heroes[c]; }
  const heroes=[]; const byType={};
  let playerCount=0, threat=0; const missingCodes=[], notOwned=[];
  for(const code in slots){
    const qty=slots[code]|0; if(qty<=0) continue;
    const card=CARDS.byCode[code];
    if(!card){ missingCodes.push(code); continue; }
    if(card.type_code==="hero"){ heroes.push({card,qty}); threat+=(+card.threat||0); }
    else { playerCount+=qty; (byType[card.type_code]=byType[card.type_code]||[]).push({card,qty}); }
    if(!isOwnedCard(card)){ for(let i=0;i<Math.min(qty,1);i++) notOwned.push(card.name); }
  }
  heroes.sort((a,b)=>(a.card.name>b.card.name?1:-1));
  const startThreat = (typeof raw.starting_threat==="number" && raw.starting_threat>0)? raw.starting_threat : threat;
  return {
    id:raw.id, name:(raw.name||"Bez názvu").replace(/\s+/g," ").trim(),
    author:raw.username||raw.user_name||"", description:raw.description_md||"",
    lastPack:raw.last_pack||"", heroes, byType, playerCount,
    threat:startThreat,
    valid50: playerCount>=50,
    fullyOwned: notOwned.length===0 && missingCodes.length===0,
    notOwned:[...new Set(notOwned)], missingCodes
  };
}

/* ---- user-added decks ---- */
function userDecks(itemKey){ const all=lsGet("lotr_user_decks",{}); return all[itemKey]||[]; }
function addUserDeck(itemKey,id){
  const all=lsGet("lotr_user_decks",{}); const arr=all[itemKey]||[];
  if(!arr.includes(id)){ arr.push(id); all[itemKey]=arr; lsSet("lotr_user_decks",all); }
}
function removeUserDeck(itemKey,id){
  const all=lsGet("lotr_user_decks",{}); all[itemKey]=(all[itemKey]||[]).filter(x=>x!==id);
  lsSet("lotr_user_decks",all);
}
function findItem(groupId,itemId){  const g=DATA.groups.find(x=>x.id===groupId); if(!g) return null;
  const it=g.items.find(x=>x.id===itemId); return it?{g,it}:null;
}
function isCuratedId(id){ id=+id;
  return DATA.groups.some(g=>g.items.some(it=>(it.deckIds||[]).includes(id)));
}

function esc(s){ return (s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }

function renderLegend(){

    `<span><i class="sdot" style="--c:var(--${k})"></i>${n}</span>`).join("");

function heroPortraits(heroes){
  if(!heroes.length) return `<div class="hero-port"></div>`;
  return heroes.map(h=>{
    const sph=SPHERE_COLORS[h.card.sphere_code]||"--neutral";
    return `<div class="hero-port" style="--sphere:var(${sph})" title="${esc(h.card.name)}">
      <img loading="lazy" src="${cardImg(h.card)}" alt="${esc(h.card.name)}"
      onerror="this.style.display='none'"></div>`;
  }).join("");
}
function sphereDots(heroes){
  const seen=new Set(); let out="";
  heroes.forEach(h=>{ const s=h.card.sphere_code; if(!seen.has(s)){seen.add(s);
    out+=`<i class="sdot" style="--c:var(${SPHERE_COLORS[s]||"--neutral"})"></i>`;} });
  return `<span class="spheres">${out}</span>`;
}

        Nájdi vhodný sólo decklist na RingsDB (len z tvojho poolu) a vlož jeho odkaz vyššie.

  });

  };

}

async function hydrateDeckCard(id,el,star){
  try{
    const d=await loadDeck(id);
    const okBadge = d.valid50
      ? (d.fullyOwned ? `<span class="pill ok">✓ poskladateľné</span>`
                      : `<span class="pill warn">⚠ ${d.notOwned.length+d.missingCodes.length} kariet mimo zbierky</span>`)
      : `<span class="pill warn">⚠ len ${d.playerCount} kariet (&lt;50)</span>`;
    el.dataset.buildable = (d.valid50 && d.fullyOwned) ? "1":"0";
    el.dataset.owned = d.fullyOwned ? "1":"0";
    el.innerHTML = `
      ${el.querySelector(".remove")?el.querySelector(".remove").outerHTML:""}
      ${star?'<span class="star" title="Odporúčaný, overený výber">★</span>':''}
      <div class="heroes">${heroPortraits(d.heroes)}</div>
      <div class="body">
        <div class="name">${esc(d.name)}</div>
        ${d.author?`<div class="by">od ${esc(d.author)}</div>`:""}
        <div class="stats">
          <span class="pill threat">Threat <b>${d.threat}</b></span>
          <span class="pill">${d.playerCount} kariet</span>
          ${sphereDots(d.heroes)}
        </div>
        <div class="stats">${okBadge}</div>
      </div>`;
    el.onclick=(e)=>{ if(e.target.classList.contains("remove"))return; go("deck",id); };
    // re-attach remove handler if present
    const rm=el.querySelector(".remove");
    if(rm){ rm.onclick=(e)=>{e.stopPropagation(); const k=currentItemKey(); if(k){removeUserDeck(k,id);} renderRoute();}; }
    applyOwnedFilter();
  }catch(err){
    el.innerHTML=`<div class="derr">Deck #${id} sa nepodarilo načítať z RingsDB.
      Skontroluj pripojenie alebo <a href="${RDB}/decklist/view/${id}" target="_blank" rel="noopener">otvor ho priamo ↗</a></div>`;
  }
}

    groupsHtml+=`<div class="cardgroup"><h3>${TYPE_LABEL[t]||t}<span class="g-cnt">${sub} ks</span></h3>

    ? `<div class="desc" style="border-left-color:var(--ember)"><h3>Pozor — mimo tvojej zbierky</h3>

    <section class="section" style="margin-top:16px">
      <div class="detail-head">
        <div class="heroes">${heroPortraits(d.heroes)}</div>
        <div class="detail-title">

          ${d.author?`<div class="by">od ${esc(d.author)}${d.lastPack?` · pool do: ${esc(d.lastPack)}`:""}</div>`:""}
          <div class="detail-stats">
            <span class="pill threat big-threat">Počiatočné ohrozenie · <b>${d.threat}</b></span>
            <span class="pill">${d.heroes.length} hrdinovia</span>
            <span class="pill">${d.playerCount} kariet v decku</span>
            ${buildBadge}
          </div>
          <div class="detail-stats"><a class="btn" href="${RDB}/decklist/view/${id}" target="_blank" rel="noopener">Otvoriť na RingsDB ↗</a></div>

/* lightweight, safe markdown-ish renderer for RingsDB descriptions */
function renderMd(md){
  let s=esc(md);
  s=s.replace(/<span class="icon-(\w+)"><\/span>/g,(m,k)=>` [${k}] `); // already escaped? handle below
  // the above won't match because esc turned < into &lt; — handle escaped version:
  s=s.replace(/&lt;span class="icon-(\w+)"&gt;&lt;\/span&gt;/g,(m,k)=>` <i class="sdot" style="--c:var(${SPHERE_COLORS[k]||"--neutral"});display:inline-block;vertical-align:middle"></i> `);
  s=s.replace(/&lt;\/?b&gt;/g,m=>m.includes("/")?"</b>":"<b>");
  s=s.replace(/&lt;\/?i&gt;/g,m=>m.includes("/")?"</i>":"<i>");
  s=s.replace(/&lt;\/?u&gt;/g,m=>m.includes("/")?"</u>":"<u>");
  s=s.replace(/\*\*([^*]+)\*\*/g,"<b>$1</b>");
  s=s.replace(/\[([^\]]+)\]\(\/card\/[^)]+\)/g,"<b>$1</b>");   // card links -> just the name
  s=s.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s=s.split(/\n{2,}/).map(p=>`<p>${p.replace(/\n/g,"<br>")}</p>`).join("");
  return s;
}
function stripMd(md){
  return md.replace(/&lt;[^&]*&gt;/g,"").replace(/<[^>]*>/g,"")
    .replace(/\*\*/g,"").replace(/\[([^\]]+)\]\([^)]*\)/g,"$1").replace(/[#*_`]/g,"").trim();
}
function cyrb(str){ let h=2166136261>>>0; for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,16777619); } return (h>>>0).toString(36); }

/* Machine-translate EN description -> CZ via Google's public gtx endpoint, cached. */
async function translateToCS(text){
  const key="lotr_tr_"+cyrb(text);
  const cached=lsGet(key,null); if(cached!==null) return cached;
  const chunks=[]; let cur="";
  for(const part of text.split(/\n\n/)){
    if((cur+part).length>3500){ if(cur)chunks.push(cur); cur=part; }
    else cur+=(cur?"\n\n":"")+part;
  }
  if(cur)chunks.push(cur);
  let out="";
  for(const ch of chunks){
    const url="https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=cs&dt=t&q="+encodeURIComponent(ch);
    const r=await fetch(url); if(!r.ok) throw new Error("tr");
    const data=await r.json();
    out+=(data[0]||[]).map(s=>s[0]).join("");
  }
  lsSet(key,out); return out;
}

/* description block: default CZ (translated), toggle to EN original */
async function setupDesc(md){
  const body=$("#descBody"), lang=$("#descLang");
  let TR=null, mode="cz";
  async function show(){
    if(mode==="en"){
      body.innerHTML=renderMd(md);
      lang.innerHTML=`<a href="#" onclick="__descToggle();return false">Zobraziť český preklad</a>`;
      return;
    }
    if(TR===null){
      body.innerHTML=`<span class="spin"></span> Prekladám popis do češtiny…`;
      try{ TR=await translateToCS(md); }catch(e){ TR=false; }
    }
    if(TR===false){
      body.innerHTML=renderMd(md);
      lang.innerHTML=`<span class="tr-note">Automatický preklad práve nie je dostupný — zobrazený je originál.</span>
        <a href="https://translate.google.com/?sl=en&tl=cs&op=translate&text=${encodeURIComponent(stripMd(esc(md)))}" target="_blank" rel="noopener">Preložiť cez Google ↗</a>`;
    } else {
      body.innerHTML=renderMd(TR);
      lang.innerHTML=`<a href="#" onclick="__descToggle();return false">Originál jazyk (EN)</a>`;
    }
  }
  window.__descToggle=()=>{ mode=(mode==="cz")?"en":"cz"; show(); };
  show();
}

/* ---------- owned-only filter ---------- */
function applyOwnedFilter(){
  const hide = $("#onlyOwned").checked && CARDS.loaded;
  let visible=0, known=0;
  document.querySelectorAll(".deck").forEach(el=>{
    const owned=el.dataset.owned;
    if(owned===undefined){ el.style.display=""; return; }   // not hydrated yet
    known++;
    if(hide && owned==="0"){ el.style.display="none"; }
    else { el.style.display=""; visible++; }
  });
  const note=document.getElementById("allHidden");
  if(note) note.style.display=(hide && known>0 && visible===0)?"":"none";
}
$("#onlyOwned").addEventListener("change",applyOwnedFilter);

}

function renderAnalysis(){
  setCrumbs(`<a onclick="go('home')">Domov</a> › Analýza kariet`);
  if(!CARDS.loaded){
    view.innerHTML=`<div class="empty" style="margin-top:22px"><b>Najprv načítaj databázu kariet</b>
      Klikni hore na zlaté tlačidlo „Nahrať databázu kariet“ a potom sem znova vojdi.</div>`;
    return;
  }
  const cycles=[
    {title:"Základná krabica", packs:["Core Set"]},
    {title:"Shadows of Mirkwood — cyklus", packs:["The Hunt for Gollum","Conflict at the Carrock","A Journey to Rhosgobel","The Hills of Emyn Muil","The Dead Marshes","Return to Mirkwood"]},
    {title:"Khazad-dûm & Dwarrowdelf", packs:["Khazad-dûm","The Redhorn Gate","Road to Rivendell","The Watcher in the Water","The Long Dark","Foundations of Stone","Shadow and Flame"]},
    {title:"Heirs of Númenor & Against the Shadow", packs:["Heirs of Númenor","The Steward's Fear","The Druadan Forest","Encounter at Amon Dîn","Assault on Osgiliath","The Blood of Gondor","The Morgul Vale"]},
    {title:"Sága (Pán prsteňov)", packs:["The Black Riders","The Road Darkens","The Treason of Saruman","The Land of Shadow","The Flame of the West","The Mountain of Fire"]}
  ];
  const byPack={};
  for(const code in CARDS.byCode){
    const c=CARDS.byCode[code];
    if(!PLAYER_TYPES.has(c.type_code)) continue;
    const pn=norm(c.pack_name);
    (byPack[pn]=byPack[pn]||[]).push(c);
  }
  const to={hero:0,ally:1,attachment:2,event:3,"player-side-quest":4,treasure:5};
  let html=`<section class="section" style="margin-top:10px">
    <div class="head scenario"><h2>Analýza kariet</h2><span class="meta">Hráčske karty podľa setov · ★ = má rozšírenú analýzu</span></div>
    <div class="guide-intro">Rozbaľ set a klepni na kartu — otvorí sa jej analýza (staty, traity a esenciálne zhrnutie). Analýzu dopĺňam postupne po setoch; teraz je hotová <b>Základná krabica</b>.</div>
    <details class="aset" style="margin-bottom:14px"><summary>📖 Slovníček pojmov (EN → CZ)<span class="cnt">${GLOSSARY.length}</span></summary>
      <div style="padding:6px 14px 14px">${GLOSSARY.map(g=>`<div class="kw"><b>${esc(g[0])}</b> — <span>${esc(g[1])}</span></div>`).join("")}</div>
    </details>`;
  for(const cyc of cycles){
    let inner="";
    for(const pack of cyc.packs){
      const list=(byPack[norm(pack)]||[]).slice().sort((a,b)=>
        (to[a.type_code]-to[b.type_code]) ||
        (a.sphere_code||"").localeCompare(b.sphere_code||"") ||
        ((a.position||0)-(b.position||0)));
      if(!list.length) continue;
      const noted=list.filter(getAnalysis).length;
      inner+=`<details class="aset"><summary>${esc(pack)}<span class="cnt">${list.length} kariet${noted?` · ${noted} ★`:""}</span></summary>
        <div class="agrid">`;
      for(const c of list){
        inner+=`<div class="acard ${getAnalysis(c)?"note":""}" onclick="openCard('${c.code}')">
          <div class="imgwrap"><img loading="lazy" src="${cardImg(c)}" alt="${esc(c.name)}" onerror="this.parentNode.classList.add('noimg')"></div></div>`;
      }
      inner+=`</div></details>`;
    }
    if(inner) html+=`<div class="acyc"><h3>${esc(cyc.title)}</h3>${inner}</div>`;
  }
  html+=`</section>`;
  view.innerHTML=html; window.scrollTo(0,0);
}

function statPill(l,v){ return (v!==undefined&&v!==null&&v!=="")?`<span class="pill">${l} ${v}</span>`:""; }
function openCard(code){
  const c=CARDS.byCode[code]; if(!c) return;
  const m=document.getElementById("cardmodal");
  const sph=SPHERE_COLORS[c.sphere_code]||"--neutral";
  let stats=`<span class="pill" style="border-color:var(${sph});color:var(${sph})">${esc(c.sphere_name||c.sphere_code||"")}</span>`+
            `<span class="pill">${esc(c.type_name||c.type_code||"")}</span>`;
  if(c.type_code==="hero"){ stats+=statPill("Threat",c.threat)+statPill("Vôľa",c.willpower)+statPill("Útok",c.attack)+statPill("Obrana",c.defense)+statPill("HP",c.health); }
  else{
    stats+=statPill("Cena",c.cost);
    if(c.type_code==="ally") stats+=statPill("Vôľa",c.willpower)+statPill("Útok",c.attack)+statPill("Obrana",c.defense)+statPill("HP",c.health);
  }
  if(c.is_unique) stats+=`<span class="pill" style="border-color:var(--gold);color:var(--gold-bright)">unikát</span>`;
  const note=getAnalysis(c);
  m.querySelector(".modal-inner").innerHTML=`
    <button class="modal-x" onclick="closeCard()">✕</button>
    <div class="modal-grid">
      <img class="modal-img" src="${cardImg(c)}" alt="${esc(c.name)}" onerror="this.style.display='none'">
      <div class="modal-info">
        <h3>${esc(c.name)}</h3>
        ${czName(c)?`<div class="czname">🇨🇿 ${esc(czName(c))}</div>`:""}
        <div class="mstats">${stats}</div>
        ${c.traits?`<div class="mtraits">${esc(c.traits)}</div>`:""}
        <div class="manalysis"><h4>Analýza</h4>
          ${note?`<p>${esc(note)}</p>`:`<p class="none">Túto kartu ešte nemám rozobratú — detailné rozbory nájdeš na Vision of the Palantir alebo Hall of Beorn. (Analýzu dopĺňam po setoch.)</p>`}
          ${c.url?`<a href="${esc(c.url)}" target="_blank" rel="noopener">Otvoriť na RingsDB ↗</a>`:""}
        </div>
      </div>
    </div>`;
  m.classList.add("open"); document.body.style.overflow="hidden";
}
function closeCard(){ const m=document.getElementById("cardmodal"); if(m){ m.classList.remove("open"); document.body.style.overflow=""; } }

function renderGuide(){
  setCrumbs(`<a onclick="go('home')">Domov</a> › Ako stavať decky`);
  const html=`<section class="section" style="margin-top:10px">
    <div class="head scenario"><h2>Ako stavať decky</h2><span class="meta">Sprievodca · odporúčania skúsených hráčov</span></div>
    <div class="guide">
    <div class="guide-intro">Praktický rámec, ako sa naučiť skladať vlastné decky — zosumarizované z Vision of the Palantir, Hall of Beorn, Tales from the Cards a RingsDB. Klepni na sekciu pre rozbalenie.</div>

    <details class="gsec" open><summary><span class="gnum">1</span>Úvod &amp; správny prístup k učeniu</summary><div class="gbody">
      <p>Skladanie deckov je remeslo, ktoré sa brúsi <b>desiatkami deckov a stovkami hier</b> — aj veteráni sa stále učia. Paradoxne, <b>čím väčší pool, tým ťažšie</b> (paralýza z výberu). Riešením nie je poznať každú kartu, ale mať opakovateľný postup a vedome si zúžiť priestor.</p>
      <ul>
        <li><b>Najviac ťa naučí hranie a rozbor prehier.</b> Po prehre sa pýtaj <em>ktorá</em> vec zlyhala, nie len „prehral som“.</li>
        <li><b>Kopírovať decky je v poriadku.</b> Vezmi hotový deck z RingsDB (filtrovaný na tvoj pool), zahraj ho, rozober prečo funguje, až potom uprav.</li>
        <li><b>Progression = riadené učenie.</b> Staviu len z kariet po daný balík (máš to v appke aj s filtrom poolu) — malý pool, jasne vidíš prínos každej karty.</li>
        <li><b>Veď si poznámky</b> — krátky „post‑mortem“ po každej prehre.</li>
      </ul>
    </div></details>

    <details class="gsec"><summary><span class="gnum">2</span>Postup stavby v 6 krokoch</summary><div class="gbody">
      <ol class="steps">
        <li><b>Koncept.</b> Čo má deck robiť? Sféra, trait/mechanika, ktorý scenár chcem poraziť, aká bude slabina.</li>
        <li><b>Hrdinovia (základ).</b> 3 hrdinovia. V solo musia pokryť <b>questing, obranu aj útok</b>; radšej rozmanité staty (poistka, keď jeden padne). Štartový threat ~<b>26–32</b>. Splash hrdina do 3. slotu na zdroje/karty.</li>
        <li><b>Karty (telo).</b> Pýtaj sa, akú <em>dieru</em> karta plní. Spojenci: <b>obrancovia pred útočníkmi</b> + utility (draw, healing, tutor). Udalosti: konzistencia a odpovede (často stačia 2×). Doplnky: vylepšujú hrdinov + readying. Vedľajšie úlohy: max ~2.</li>
        <li><b>Krivka.</b> Väčšina kariet <b>0–1–2 zdroje</b>. Hra trvá ~10 kôl → bez draw uvidíš len ~16 kariet, preto potrebuješ <b>card draw/tutor</b>.</li>
        <li><b>Orez na 50.</b> 50 = optimum. Rež duplicitné riešenia a 3. kópie unique kariet. Posledných 5 daj do sideboardu (vymeníš podľa scenára).</li>
        <li><b>Test &amp; iterácia.</b> Skúšaj proti rôznym scenárom. Zlyhanie = dáta → uprav a opakuj.</li>
      </ol>
    </div></details>

    <details class="gsec"><summary><span class="gnum">3</span>Stavba podľa scenára — aby deck vedel reagovať</summary><div class="gbody">
      <h4>4 úlohy, ktoré solo deck musí zvládnuť</h4>
      <ul>
        <li><b>Questing</b> — viac vôle než hrozby v staging.</li>
        <li><b>Obrana</b> — prežiť útoky (obranca + HP/healing/chump).</li>
        <li><b>Útok</b> — zabíjať nepriateľov, nech sa nehromadia.</li>
        <li><b>Engine</b> — draw + zdroje, aby si sa dostal <em>pred</em> encounter deck.</li>
      </ul>
      <p>Keď niektorú z týchto 4 nezvládaš, presne tam prehráš — a to hľadaj v post‑morteme.</p>
      <h4>Čítanie encounter decku</h4>
      <ul>
        <li><b>Nepriatelia:</b> veľkí bossovia (silný obranca + burst) vs swarm (plošné zabíjanie/chump).</li>
        <li><b>Lokácie vs boj:</b> veľa lokácií → location control; veľa boja → obrana + útok.</li>
        <li><b>Kľúčové slová:</b> Archery → HP/healing; Surge → menej vlastného draw, viac scrying; Doomed → threat reduction; Battle/Siege → questuješ útokom/obranou.</li>
        <li><b>Enemy archetypy:</b> Dunland trestá veľkosť ruky, Corsair kradne zdroje, Easterling lepí attachmenty… poznaj „povahu“ setu a vezmi tech.</li>
      </ul>
      <h4>Toolbox + sideboard</h4>
      <p>Maj stabilné <b>jadro</b> (motor + 4 úlohy) a vymeniteľnú <b>tech vrstvu</b> podľa questu. Konkrétne karty z tvojho poolu nájdeš v sekcii 6.</p>
    </div></details>

    <details class="gsec"><summary><span class="gnum">4</span>Ako rozpoznať silu karty</summary><div class="gbody">
      <p class="lead">Pýtaj sa: „akú ÚLOHU karta plní a ako efektívne?“</p>
      <div class="cheat">
        <div class="c"><b>Efektivita</b><span>Koľko vôle/útoku/HP dostaneš za 1 zdroj. Lacné + silné = staple.</span></div>
        <div class="c"><b>Flexibilita</b><span>Robí viac vecí / sedí do väčšiny deckov (Steward of Gondor, A Test of Will, Unexpected Courage).</span></div>
        <div class="c"><b>Card advantage</b><span>Karta, čo ti dotiahne kartu alebo dá viac hodnoty, než stojí (Gléowine, Daeron's Runes).</span></div>
        <div class="c"><b>Tempo</b><span>Zdroje a mustering ťa dostanú pred encounter deck (Steward, Sneak Attack).</span></div>
        <div class="c"><b>Akčná výhoda</b><span>Readying (Unexpected Courage, Fast Hitch) — jedna postava robí dve veci. V solo zlato.</span></div>
        <div class="c"><b>Answer &gt; win‑more</b><span>Do jadra patria stabilizačné karty (cancel, healing, threat down), nie „vyhrám‑viac“ karty.</span></div>
      </div>
      <p><b>Barometer:</b> RingsDB „most used cards“ a séria <em>Staples</em> na Vision of the Palantir ukazujú, čo skúsení reálne hrajú.</p>
    </div></details>

    <details class="gsec"><summary><span class="gnum">5</span>Ako rozpoznať synergiu</summary><div class="gbody">
      <p>Dva druhy: okolo <b>traitu</b> a okolo <b>mechaniky (motor)</b>. Na karte sa pýtaj: <em>„čoho sa dotýka?“</em> — traitu, keywordu, typu karty, alebo zóny (ruka/discard/vrch/staging).</p>
      <div class="cheat">
        <div class="c"><b>Trait synergia</b><span>Text spomína trait: „each Dwarf/Outlands/Gondor…“. Dwarves swarm, Outlands (Ethir Swordsman +1 každému), Gondor, Rohan, Noldor, Silvan, Hobbits.</span></div>
        <div class="c"><b>Motory (engines)</b><span>Karta A zlacňuje/opakuje kartu B: Elrond+Vilya, Damrod+pasce, Hirluin+Outlands, Arwen+Noldor discard, Sneak Attack+Gandalf.</span></div>
        <div class="c"><b>Keyword synergia</b><span>Ranged/Sentinel (cez stôl), Secrecy (nízky threat → zľavy), Valour (vysoký threat → bonusy), Doomed.</span></div>
        <div class="c"><b>Pravidlo</b><span>Hľadaj 2–3 kartové motory s opakovanou výhodou a postav deck tak, aby si ich spoľahlivo NAŠIEL (tutor/draw + 3 kópie).</span></div>
      </div>
    </div></details>

    <details class="gsec"><summary><span class="gnum">6</span>Answer / tech karty z tvojho poolu</summary><div class="gbody">
      <p>Lekárnička na ladenie deckov podľa hrozby. Všetko je z tvojich krabíc (v zátvorke balík pôvodu).</p>

      <div class="tech"><b>Threat reduction</b> · <span class="cards">The Galadhrim's Greeting <i>(Core)</i>, Elrond's Counsel <i>(Watcher in the Water)</i>, Gandalf <i>(Core)</i>, Aragorn (Lore) <i>(Watcher in the Water)</i></span></div>
      <div class="tech"><b>Healing</b> · <span class="cards">Warden of Healing <i>(The Long Dark)</i>, Daughter of the Nimrodel <i>(Core)</i>, Lore of Imladris <i>(Core)</i>, Self Preservation <i>(Core)</i>, hrdina Elrond <i>(Core)</i></span></div>

      <div class="tech"><b>Zdroje (acceleration)</b> · <span class="cards">Steward of Gondor <i>(Core)</i>, Errand‑rider <i>(Heirs of Númenor)</i>, A Good Harvest <i>(The Steward's Fear)</i>, Bifur <i>(Khazad‑dûm)</i></span></div>
      <div class="tech"><b>Card draw</b> · <span class="cards">Gléowine <i>(Core)</i>, Daeron's Runes <i>(Foundations of Stone)</i>, Lórien's Wealth <i>(Core)</i>, Ancient Mathom <i>(Rhosgobel)</i>, Mithrandir's Advice <i>(The Steward's Fear)</i>, Legacy of Durin <i>(Khazad‑dûm)</i></span></div>

      <ul>
        <li><b>Jeden nápad na deck</b> — nie „všetko naraz“.</li>
        <li><b>Obmedz pool</b> — progression alebo mono‑sphere (menej možností = rýchlejšie učenie). Pomôže ti filter „len decky z mojej zbierky“.</li>
        <li><b>Kopíruj → hraj → uprav</b> — vymeň 3–5 kariet a sleduj rozdiel (A/B).</li>
        <li><b>Post‑mortem</b> — ktorá zo 4 úloh zlyhala? Aká karta chýbala?</li>

  view.innerHTML=html; window.scrollTo(0,0);
}

function renderPhases(){

  const combatExtra = `

      <li>Akcie hráčov (priprav postavy; Paráda už nezastaví práve prebiehajúci útok).</li>
      <li>Zvoľ obrancu (vyčerpaj postavu, ktorá bude útoku čeliť).</li>
      <li>Akcie hráčov (posledná šanca zrušiť kartu tieňa).</li>
      <li>Odhaľ kartu tieňa a vyhodnoť jej efekt.</li>
      <li>Akcie hráčov (uprav hodnotu obrany pred vyhodnotením poškodenia).</li>

      <li>Akcie hráčov.</li>
      <li>Koniec útoku — ak sú v strete ďalší nepriatelia, ktorí ešte môžu útočiť, opakuj kroky.</li>

    <details class="subseq"><summary>Útok hráčov (6.5) — kroky</summary><ol>
      <li>Označ cieľ útoku a útočníkov.</li>
      <li>Akcie hráčov (uprav hodnotu sily pred vyhodnotením poškodenia).</li>
      <li>Vyhodnoť poškodenie (porovnaj silu útoku s obranou nepriateľa a spôsob poškodenie).</li>
      <li>Koniec útoku — pokračuje ďalší hráč; ak už niet na koho útočiť, prejdi na koniec fázy boja.</li>
    </ol></details>`;

    {n:"0",c:"#9aa0ab",t:"Začiatok kola",en:"",steps:[["note","Môžu sa spustiť niektoré trvalé efekty."]]},
    {n:"1",c:"var(--gold)",t:"Fáza zdrojov",en:"Resource",steps:[
      ["","Pridaj 1 zdroj do zásoby každého hrdinu."],
      ["","Dober 1 kartu."],
      ["","Akcie hráčov."]]},
    {n:"2",c:"var(--leadership)",t:"Fáza plánovania",en:"Planning",steps:[
      ["","Hráči hrajú spojencov a doplnky (všetci súčasne)."],
      ["note","Akcie hráčov možno vykonať kedykoľvek počas tohto kroku."]]},
    {n:"3",c:"var(--spirit)",t:"Fáza úlohy",en:"Quest",steps:[
      ["","Hráči sa rozhodnú, ktorú úlohu budú plniť — hlavnú alebo vedľajšiu."],
      ["","Akcie hráčov (napr. Zákerný útok / Sneak Attack na Gandalfa)."],
      ["","Hráči vyšlú postavy plniť úlohu."],
      ["note","Vyslať postavy na úlohu kedykoľvek inokedy už nie je možné."],
      ["","Akcie hráčov."],
      ["","Z balíčka stretnutia sa odhalí 1 karta na hráča."],
      ["note","Kľúčové slová Nápor a Zatratenie na kartách stretnutia sa vyhodnocujú len vo fáze úlohy."],
      ["","Akcie hráčov (uprav celkovú vôľu ešte pred vyhodnotením úlohy)."],
      ["","Vyhodnotenie úlohy — porovnaj vôľu s mierou hrozby; rozdiel je buď postup, alebo zvýšenie ohrozenia."]]},
    {n:"4",c:"var(--lore)",t:"Fáza putovania",en:"Travel",steps:[
      ["","Hráči môžu putovať do 1 lokácie (ak práve nie je žiadna lokácia aktívna; treba splniť efekt „Putovanie“)."],
      ["","Akcie hráčov."]]},
    {n:"5",c:"#d98a3a",t:"Fáza stretnutia",en:"Encounter",steps:[
      ["","Každý hráč sa môže stretnúť s 1 nepriateľom (v oblasti odhalenia, umiestni ho pred seba proti svojim postavám)."],
      ["","Akcie hráčov."],
      ["","Skúšky stretnutia (počnúc prvým hráčom)."],
      ["","Akcie hráčov (napr. Rýchly úder)."]]},
    {n:"6",c:"var(--ember)",t:"Fáza boja",en:"Combat",steps:[
      ["","Vyhodnoť kľúčové slovo nepriateľov — Lukostreľba X / Archery X."],
      ["","Prideľ každému nepriateľovi v strete 1 kartu tieňa."],
      ["note","Karty tieňa sa udeľujú iba v tomto kroku — nikdy inokedy."],
      ["","Akcie hráčov (napr. Rýchly úder, Paráda, Les kopijí…)."],

    {n:"7",c:"var(--gold-bright)",t:"Fáza obnovenia",en:"Refresh",steps:[
      ["","Priprav vyčerpané karty."],
      ["","Zvýš ohrozenie o 1."],
      ["note","Ak dosiahneš hodnotu 50+, si vyradený z hry."],
      ["","Odovzdaj žetón prvého hráča."],
      ["","Akcie hráčov."]]},
    {n:"8",c:"#9aa0ab",t:"Koniec kola",en:"",steps:[
      ["note","Môžu sa spustiť niektoré trvalé efekty; zahoď karty s trvaním do konca kola (napr. Gandalf)."]]}
  ];
  const KW=[
    ["Střelec / Ranged","postava môže útočiť na nepriateľa, ktorý je v strete s iným hráčom."],
    ["Stráž / Sentinel","postava môže byť obrancom proti útoku nepriateľa v strete s iným hráčom."],
    ["Omezení / Restricted","postava môže mať pripojené najviac 2 doplnky s týmto kľúčovým slovom, inak ich musí odhodiť."],
    ["Lukostreľba X / Archery X","na začiatku fázy boja rozdeľ podľa vlastnej voľby X poškodenia medzi postavy hráčov."],
    ["Nápor / Surge","vo fáze úlohy (alebo príprave hry) odhaľ z balíčka stretnutia ešte 1 ďalšiu kartu."],
    ["Zatratenie X / Doomed X","každý hráč si musí zvýšiť ohrozenie o uvedenú hodnotu X."],
    ["Trvalý efekt","nevyhnutný efekt, ktorý ovplyvňuje hru neustále, kým je karta v hre (nie je hrubým písmom)."]
  ];
  let html=`<section class="section" style="margin-top:10px">
    <div class="head scenario"><h2>Fázy kola</h2><span class="meta">Priebeh jedného kola · Pán prsteňov LCG</span></div>
    <div class="phases-intro">Poradie krokov v jednom kole. Takmer po každom kroku nasleduje okno na <em>akcie hráčov</em>. Pri Fáze boja rozbaľ detailné kroky útoku klepnutím.</div>

  for(const p of P){
    html+=`<div class="phase" style="--pc:${p.c}">
      <div class="num">${p.n}</div>
      <div class="pcard">
        <div class="ptitle">${p.t}</div>
        ${p.en?`<div class="pen">${p.en}</div>`:""}
        <ul>${p.steps.map(s=>`<li class="${s[0]}">${s[1]}</li>`).join("")}</ul>
        ${p.extra||""}
      </div></div>`;
  }
  html+=`</div><div class="keywords"><h3>Kľúčové slová</h3>
    ${KW.map(k=>`<div class="kw"><b>${k[0]}</b> — <span>${k[1]}</span></div>`).join("")}
    </div></section>`;
  view.innerHTML=html; window.scrollTo(0,0);
}

function go(v,a,b){
  if(v==="home") location.hash="";
  else if(v==="list") location.hash=`#list/${a}/${b}`;
  else if(v==="deck") location.hash=`#deck/${a}`;
  else if(v==="phases") location.hash="#phases";
  else if(v==="guide") location.hash="#guide";
  else if(v==="analysis") location.hash="#analysis";
}
function renderRoute(){
  const h=location.hash.replace(/^#/,"");
  if(h.startsWith("list/")){ const [,g,it]=h.split("/"); CURRENT={view:"list",g,it}; renderList(g,it); }
  else if(h.startsWith("deck/")){ const [,id]=h.split("/"); CURRENT={view:"deck",id}; renderDeck(+id); }
  else if(h==="phases"){ CURRENT={view:"phases"}; renderPhases(); }
  else if(h==="guide"){ CURRENT={view:"guide"}; renderGuide(); }
  else if(h==="analysis"){ CURRENT={view:"analysis"}; renderAnalysis(); }
  else { CURRENT={view:"home"}; renderHome(); }
}
window.addEventListener("hashchange",renderRoute);
window.go=go;
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeCard(); });

/* ---------- boot ---------- */
const reloadBtn=$("#reload");
function loadedUI(ok){
  if(ok){ reloadBtn.textContent="Obnoviť databázu kariet"; reloadBtn.classList.remove("gold");
    setStatus("✓ Databáza kariet je načítaná — vyberaj scenár nižšie. (Uloží sa a funguje aj offline pre už prezreté decky.)"); }
  else { reloadBtn.textContent="Nahrať databázu kariet"; reloadBtn.classList.add("gold");
    setStatus("Databázu kariet treba načítať z RingsDB (potrebný internet). Klikni na zlaté tlačidlo.",true); }
}
reloadBtn.onclick=async()=>{ try{ setStatus("Obnovujem databázu kariet…"); await loadCards(true);
  loadedUI(true); renderRoute(); }catch(e){ loadedUI(false); } };

(async function boot(){
  renderLegend();
  try{
    await loadCards(false);
    loadedUI(true);
  }catch(e){
    loadedUI(false);
  }
  renderRoute();
})();
</script>
